<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléconsultation - Ma Santé en Ligne</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 { color: #2c3e50; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        h3 { color: #2c3e50; margin-bottom: 15px; border-bottom: 2px solid #667eea; display: inline-block; padding-bottom: 8px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        
        .btn-logout { background: #e74c3c; width: auto; padding: 8px 16px; }
        .btn-consult { background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); width: auto; padding: 10px 20px; }
        .btn-end-call { background: #e74c3c; width: auto; padding: 10px 20px; }
        .btn-accept { background: #27ae60; width: auto; padding: 8px 16px; }
        .btn-reject { background: #e74c3c; width: auto; padding: 8px 16px; }
        
        .two-columns { display: flex; gap: 30px; flex-wrap: wrap; }
        .column { flex: 1; min-width: 250px; }
        
        .error { background: #fee; color: #c00; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .success { background: #efe; color: #0a0; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .user-info { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 10px; color: white; display: flex; align-items: center; gap: 15px; }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-patient { background: #3498db; color: white; }
        .badge-medecin { background: #2ecc71; color: white; }
        
        .dashboard { display: none; }
        
        .doctor-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .doctor-card:hover { background: #e9ecef; transform: translateX(5px); }
        .doctor-card.selected { background: #d4edda; border-color: #27ae60; }
        .doctor-info { display: flex; align-items: center; gap: 15px; }
        .doctor-avatar { font-size: 40px; }
        .doctor-details h4 { margin-bottom: 5px; color: #2c3e50; }
        .doctor-details p { color: #7f8c8d; font-size: 14px; }
        .doctor-status { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #2ecc71; color: white; }
        
        .selected-doctor-info { margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 10px; text-align: center; }
        
        .video-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        .video-box { flex: 1; min-width: 280px; background: #1a1a2e; border-radius: 12px; overflow: hidden; text-align: center; }
        .video-box h4 { color: white; padding: 10px; background: rgba(0,0,0,0.5); margin: 0; }
        video { width: 100%; background: #0f0f1a; min-height: 300px; transform: scaleX(-1); }
        
        .call-controls { margin-top: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        .incoming-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            max-width: 300px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .sensor-card {
            background: #f0f4f8;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        .sensor-value { font-size: 2em; font-weight: bold; color: #667eea; text-align: center; }
        .sensor-unit { font-size: 0.8em; color: #888; text-align: center; }
        .fhir-output {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 15px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .hidden { display: none; }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .card { padding: 20px; }
            .video-box video { min-height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <h1 style="color: white;">🔒 Ma Santé en Ligne</h1>
            <div id="userInfo" class="user-info hidden"></div>
        </div>
        
        <div id="authPanel" class="card">
            <div id="authError" class="error"></div>
            <div id="authSuccess" class="success"></div>
            <div class="two-columns">
                <div class="column">
                    <h2>🔐 Connexion</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="loginPassword" required>
                        </div>
                        <button type="submit">Se connecter</button>
                    </form>
                </div>
                <div class="column">
                    <h2>📝 Inscription</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label>Nom complet</label>
                            <input type="text" id="registerName" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="registerEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="registerPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Je suis :</label>
                            <select id="registerRole">
                                <option value="patient">👤 Patient</option>
                                <option value="medecin">👨‍⚕️ Médecin</option>
                            </select>
                        </div>
                        <button type="submit">S'inscrire</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div id="dashboard" class="dashboard">
            <div class="card">
                <div id="dashboardContent">
                    <p style="text-align: center;">Chargement...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ============================================
        // CONFIGURATION ICE AVEC TURN/STUN
        // Conforme au cahier des charges
        // ============================================
        const SERVER_IP = '192.168.23.129';
        
        const configuration = {
            iceServers: [
                // Serveurs STUN publics (fallback)
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                
                // Notre serveur STUN (sur la VM)
                { urls: `stun:${SERVER_IP}:3478` },
                
                // Notre serveur TURN (obligatoire selon cahier des charges)
                {
                    urls: `turn:${SERVER_IP}:3478`,
                    username: 'patient',
                    credential: 'patient123'
                },
                {
                    urls: `turn:${SERVER_IP}:3478`,
                    username: 'medecin',
                    credential: 'medecin123'
                },
                {
                    urls: `turns:${SERVER_IP}:3478`,
                    username: 'patient',
                    credential: 'patient123'
                }
            ],
            iceCandidatePoolSize: 10,
            iceTransportPolicy: 'all'
        };
        
        console.log('🔧 Configuration ICE avec TURN/STUN:', configuration);
        
        let currentUser = null;
        let doctors = [];
        let selectedDoctor = null;
        let socket = null;
        let localStream = null;
        let peerConnection = null;
        let currentCallId = null;
        let currentTargetSocketId = null;
        let activeCall = false;
        let sensorInterval = null;
        
        function showError(message) {
            const errorDiv = document.getElementById('authError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 4000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('authSuccess');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => successDiv.style.display = 'none', 4000);
        }
        
        async function register(userData) {
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.message);
                showSuccess(data.message);
                document.getElementById('registerForm').reset();
            } catch (error) {
                showError(error.message);
            }
        }
        
        async function login(credentials) {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.message);
                currentUser = data.user;
                await loadDoctors();
                initSocket();
                updateUI();
            } catch (error) {
                showError(error.message);
            }
        }
        
        async function loadDoctors() {
            try {
                const response = await fetch('/api/doctors');
                doctors = await response.json();
            } catch (error) {
                console.error('Erreur chargement médecins:', error);
                doctors = [];
            }
        }
        
        function logout() {
            if (activeCall) endCall();
            if (sensorInterval) clearInterval(sensorInterval);
            if (socket) { socket.disconnect(); socket = null; }
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            currentUser = null;
            selectedDoctor = null;
            updateUI();
        }
        
        function initSocket() {
            if (socket) socket.disconnect();
            socket = io({ transports: ['websocket', 'polling'] });
            
            socket.on('connect', () => {
                console.log('🔒 Socket.IO connecté (WSS)');
                socket.emit('register-user-name', {
                    userId: currentUser.id,
                    userName: currentUser.name,
                    role: currentUser.role
                });
            });
            
            socket.on('incoming-call', (data) => {
                if (currentUser.role === 'medecin') showIncomingCallNotification(data);
            });
            
            socket.on('call-accepted', async (data) => {
                currentCallId = data.callId;
                currentTargetSocketId = data.doctorSocketId;
                showSuccess('✅ Le médecin a accepté la consultation.');
                await startCall(true);
            });
            
            socket.on('call-rejected', (data) => {
                alert('❌ Le médecin a refusé la consultation.');
                endCall();
            });
            
            socket.on('ready-for-webrtc', async (data) => {
                currentCallId = data.callId;
                currentTargetSocketId = data.patientSocketId;
                await startCall(false);
            });
            
            socket.on('webrtc-offer', async (data) => { await handleOffer(data); });
            socket.on('webrtc-answer', async (data) => { await handleAnswer(data); });
            socket.on('webrtc-ice-candidate', async (data) => { await handleIceCandidate(data); });
            socket.on('call-ended', () => { endCall(); });
            socket.on('sensor-data', (data) => { displayRemoteSensorData(data); });
        }
        
        async function startCall(isInitiator) {
            try {
                showCallInterface(true);
                await new Promise(resolve => setTimeout(resolve, 100));
                
                console.log('📸 Demande accès caméra...');
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                console.log('✅ Accès caméra accordé');
                
                const localVideo = document.getElementById('localVideo');
                if (localVideo) localVideo.srcObject = localStream;
                
                peerConnection = new RTCPeerConnection(configuration);
                console.log('🔧 PeerConnection créée avec configuration TURN/STUN');
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                    }
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && currentTargetSocketId) {
                        console.log('🧊 ICE Candidate:', event.candidate.type, event.candidate.candidate);
                        socket.emit('webrtc-ice-candidate', {
                            targetSocketId: currentTargetSocketId,
                            candidate: event.candidate
                        });
                    }
                };
                
                peerConnection.oniceconnectionstatechange = () => {
                    console.log('🔌 ICE Connection State:', peerConnection.iceConnectionState);
                    if (peerConnection.iceConnectionState === 'connected') {
                        console.log('✅ Connexion ICE établie');
                    }
                };
                
                if (isInitiator) {
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('webrtc-offer', {
                        targetSocketId: currentTargetSocketId,
                        offer: offer
                    });
                }
                
                activeCall = true;
                startSensorSimulation();
                
            } catch (error) {
                console.error('Erreur WebRTC:', error);
                if (error.name === 'NotAllowedError') {
                    alert('❌ Vous devez autoriser la caméra.\n\nCliquez sur le cadenas 🔒 dans la barre d\'adresse.');
                } else {
                    alert('❌ Erreur: ' + error.message);
                }
                endCall();
            }
        }
        
        async function handleOffer(data) {
            if (!peerConnection) {
                showCallInterface(true);
                await new Promise(resolve => setTimeout(resolve, 100));
                
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const localVideo = document.getElementById('localVideo');
                if (localVideo) localVideo.srcObject = localStream;
                
                peerConnection = new RTCPeerConnection(configuration);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
                
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && event.streams[0]) remoteVideo.srcObject = event.streams[0];
                };
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && currentTargetSocketId) {
                        socket.emit('webrtc-ice-candidate', {
                            targetSocketId: currentTargetSocketId,
                            candidate: event.candidate
                        });
                    }
                };
            }
            
            await peerConnection.setRemoteDescription(data.offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('webrtc-answer', {
                targetSocketId: data.fromSocketId,
                answer: answer
            });
            
            activeCall = true;
            startSensorSimulation();
        }
        
        async function handleAnswer(data) {
            if (peerConnection && peerConnection.currentRemoteDescription === null) {
                await peerConnection.setRemoteDescription(data.answer);
            }
        }
        
        async function handleIceCandidate(data) {
            if (peerConnection) {
                try { await peerConnection.addIceCandidate(data.candidate); }
                catch (error) { console.error('Erreur ICE:', error); }
            }
        }
        
        async function endCall() {
            activeCall = false;
            if (sensorInterval) clearInterval(sensorInterval);
            if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            if (currentCallId && socket) { socket.emit('end-call', { callId: currentCallId }); currentCallId = null; }
            currentTargetSocketId = null;
            showCallInterface(false);
            loadDashboardContent();
        }
        
        function showCallInterface(show) {
            const container = document.getElementById('dashboardContent');
            const existingInterface = document.getElementById('callInterface');
            if (existingInterface) existingInterface.remove();
            
            if (show && container) {
                const callDiv = document.createElement('div');
                callDiv.id = 'callInterface';
                callDiv.innerHTML = `
                    <div class="video-container">
                        <div class="video-box"><h4>👤 Vous</h4><video id="localVideo" autoplay muted playsinline></video></div>
                        <div class="video-box"><h4>🩺 ${currentUser?.role === 'patient' ? 'Médecin' : 'Patient'}</h4><video id="remoteVideo" autoplay playsinline></video></div>
                    </div>
                    <div class="call-controls"><button class="btn-end-call" onclick="window.endCall()">📞 Raccrocher</button></div>
                    <div class="sensor-card">
                        <h4>📊 Télésurveillance - Signes Vitaux</h4>
                        <div class="sensor-value" id="heartRate">--</div>
                        <div class="sensor-unit">Battements par minute (BPM)</div>
                        <div id="fhirOutput" class="fhir-output"><strong>📋 FHIR Observation</strong><br><pre>En attente...</pre></div>
                    </div>
                `;
                const consultationArea = document.getElementById('consultationArea') || container;
                consultationArea.innerHTML = '';
                consultationArea.appendChild(callDiv);
            }
        }
        
        function startSensorSimulation() {
            if (sensorInterval) clearInterval(sensorInterval);
            sensorInterval = setInterval(() => {
                const heartRate = Math.floor(Math.random() * (100 - 60 + 1) + 60);
                const timestamp = new Date().toISOString();
                updateSensorDisplay(heartRate);
                const fhirObservation = createFhirObservation(heartRate, timestamp);
                displayFhirJson(fhirObservation);
                if (currentTargetSocketId && socket) {
                    socket.emit('sensor-data', {
                        targetSocketId: currentTargetSocketId,
                        sensorType: 'heart-rate',
                        value: heartRate,
                        unit: 'beats/min',
                        timestamp: timestamp,
                        fhirResource: fhirObservation
                    });
                }
            }, 5000);
        }
        
        function updateSensorDisplay(value) {
            const hrDiv = document.getElementById('heartRate');
            if (hrDiv) hrDiv.innerHTML = `${value} BPM`;
        }
        
        function displayRemoteSensorData(data) {
            const hrDiv = document.getElementById('heartRate');
            if (hrDiv && data.value) hrDiv.innerHTML = `${data.value} BPM`;
            if (data.fhirResource) displayFhirJson(data.fhirResource);
        }
        
        function createFhirObservation(heartRate, timestamp) {
            return {
                resourceType: "Observation",
                id: `obs-${Date.now()}-${Math.random().toString(36).substr(2, 6)}`,
                meta: { profile: ["http://hl7.org/fhir/StructureDefinition/vitalsigns"] },
                status: "final",
                category: [{ coding: [{ system: "http://terminology.hl7.org/CodeSystem/observation-category", code: "vital-signs", display: "Vital Signs" }] }],
                code: { coding: [{ system: "http://loinc.org", code: "8867-4", display: "Heart rate" }], text: "Fréquence cardiaque" },
                subject: { reference: `Patient/${currentUser?.id || 'unknown'}`, display: currentUser?.name || "Patient" },
                effectiveDateTime: timestamp,
                issued: new Date().toISOString(),
                valueQuantity: { value: heartRate, unit: "beats/minute", system: "http://unitsofmeasure.org", code: "/min" },
                performer: [{ reference: `Practitioner/${currentTargetSocketId || 'system'}`, display: "Système de télésurveillance" }],
                device: { display: "Simulateur de capteur médical" },
                note: [{ text: "Mesure simulée" }]
            };
        }
        
        function displayFhirJson(fhirResource) {
            const output = document.getElementById('fhirOutput');
            if (output) output.innerHTML = `<strong>📋 FHIR Observation (JSON)</strong><br><pre>${JSON.stringify(fhirResource, null, 2)}</pre>`;
        }
        
        let pendingCall = null;
        function showIncomingCallNotification(data) {
            const old = document.querySelector('.incoming-notification');
            if (old) old.remove();
            pendingCall = data;
            const notif = document.createElement('div');
            notif.className = 'incoming-notification';
            notif.innerHTML = `
                <h4>📞 Appel entrant</h4>
                <p><strong>Patient:</strong> ${data.patientName}</p>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-accept" onclick="window.acceptCall()">✅ Accepter</button>
                    <button class="btn-reject" onclick="window.rejectCall()">❌ Refuser</button>
                </div>
            `;
            document.body.appendChild(notif);
        }
        
        window.acceptCall = function() {
            if (pendingCall) {
                document.querySelector('.incoming-notification')?.remove();
                currentCallId = pendingCall.callId;
                currentTargetSocketId = pendingCall.fromSocketId;
                socket.emit('accept-call', {
                    callId: pendingCall.callId,
                    doctorId: currentUser.id,
                    doctorName: currentUser.name,
                    patientSocketId: pendingCall.fromSocketId
                });
                pendingCall = null;
            }
        };
        
        window.rejectCall = function() {
            if (pendingCall) {
                socket.emit('reject-call', { callId: pendingCall.callId, patientSocketId: pendingCall.fromSocketId });
                document.querySelector('.incoming-notification')?.remove();
                pendingCall = null;
            }
        };
        
        window.endCall = endCall;
        
        window.selectDoctor = function(doctor) {
            selectedDoctor = doctor;
            loadDashboardContent();
        };
        
        window.requestCall = function() {
            if (!selectedDoctor) { alert('Veuillez sélectionner un médecin'); return; }
            if (!socket) { alert('Problème de connexion'); return; }
            socket.emit('call-doctor', {
                patientId: currentUser.id,
                patientName: currentUser.name,
                doctorId: selectedDoctor.id,
                doctorName: selectedDoctor.name
            });
            showSuccess('📞 Demande envoyée...');
        };
        
        function loadDashboardContent() {
            const container = document.getElementById('dashboardContent');
            if (!container) return;
            
            if (currentUser.role === 'patient') {
                let doctorsHtml = '';
                doctors.forEach(doctor => {
                    doctorsHtml += `
                        <div class="doctor-card ${selectedDoctor?.id === doctor.id ? 'selected' : ''}" onclick="selectDoctor(${JSON.stringify(doctor).replace(/"/g, '&quot;')})">
                            <div class="doctor-info">
                                <div class="doctor-avatar">${doctor.avatar}</div>
                                <div class="doctor-details">
                                    <h4>${doctor.name}</h4>
                                    <p>${doctor.specialty}</p>
                                </div>
                            </div>
                            <div class="doctor-status">Disponible</div>
                        </div>
                    `;
                });
                
                let selectedHtml = '';
                if (selectedDoctor) {
                    selectedHtml = `
                        <div class="selected-doctor-info">
                            <strong>👨‍⚕️ Médecin sélectionné :</strong> ${selectedDoctor.name} (${selectedDoctor.specialty})
                            <button class="btn-consult" onclick="requestCall()">🩺 Lancer la consultation</button>
                        </div>
                    `;
                }
                
                container.innerHTML = `
                    <h2>👋 Bonjour ${currentUser.name}</h2>
                    <h3>📋 Annuaire des médecins</h3>
                    <div id="doctorList">${doctorsHtml || '<p>Aucun médecin disponible.</p>'}</div>
                    ${selectedHtml}
                    <div id="consultationArea" style="margin-top: 20px;"></div>
                `;
            } else {
                container.innerHTML = `
                    <h2>👨‍⚕️ Bonjour Dr. ${currentUser.name}</h2>
                    <h3>📞 État de la consultation</h3>
                    <div style="padding: 20px; text-align: center; background: #f8f9fa; border-radius: 10px;">
                        <p>🟢 Connecté et disponible</p>
                        <p style="font-size: 14px; color: #888;">Les consultations arriveront ici</p>
                    </div>
                    <div id="consultationArea" style="margin-top: 30px;"></div>
                `;
            }
        }
        
        function updateUI() {
            const authPanel = document.getElementById('authPanel');
            const dashboard = document.getElementById('dashboard');
            const userInfo = document.getElementById('userInfo');
            
            if (currentUser) {
                authPanel.style.display = 'none';
                dashboard.style.display = 'block';
                userInfo.classList.remove('hidden');
                userInfo.innerHTML = `
                    <span>🔒 ${currentUser.name}</span>
                    <span class="badge ${currentUser.role === 'patient' ? 'badge-patient' : 'badge-medecin'}">
                        ${currentUser.role === 'patient' ? 'Patient' : 'Médecin'}
                    </span>
                    <button class="btn-logout" onclick="logout()">Déconnexion</button>
                `;
                loadDashboardContent();
            } else {
                authPanel.style.display = 'block';
                dashboard.style.display = 'none';
                userInfo.classList.add('hidden');
                if (socket) { socket.disconnect(); socket = null; }
            }
        }
        
        document.getElementById('registerForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            register({
                name: document.getElementById('registerName').value,
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value,
                role: document.getElementById('registerRole').value
            });
        });
        
        document.getElementById('loginForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            login({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            });
        });
        
        updateUI();
    </script>
</body>
</html>
