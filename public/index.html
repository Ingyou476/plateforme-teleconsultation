<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Téléconsultation</title>

    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

<h1>Plateforme Téléconsultation</h1>

<div class="login">

    <input type="text" id="username" placeholder="Nom">

    <select id="role">
        <option value="patient">Patient</option>
        <option value="medecin">Médecin</option>
    </select>

    <button onclick="join()">Connexion</button>
</div>

<hr>

<h2>Utilisateurs connectés</h2>

<div id="users"></div>

<hr>

<div class="videos">

    <div>
        <h3>Local</h3>
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div>
        <h3>Remote</h3>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

</div>

<hr>

<h2>Pseudo-capteur</h2>

<div id="sensor">
    Fréquence cardiaque :
    <span id="heartRate">0</span> BPM
</div>

<button onclick="generateFHIR()">Générer FHIR</button>

<pre id="fhirOutput"></pre>

<script src="fhir.js"></script>
<script src="app.js"></script>

</body>
</html>
