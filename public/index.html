<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Téléconsultation - Ma Santé en Ligne</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        h1 { color: #2c3e50; margin-bottom: 10px; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 1.5rem; }
        h3 { color: #2c3e50; margin-bottom: 15px; font-size: 1.2rem; border-bottom: 2px solid #667eea; padding-bottom: 8px; display: inline-block; }
        h4 { margin-bottom: 10px; color: #555; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .btn-logout {
            background: #e74c3c;
            width: auto;
            padding: 8px 16px;
        }
        .btn-consult {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            width: auto;
            padding: 10px 20px;
            margin-top: 10px;
        }
        .btn-end-call {
            background: #e74c3c;
            width: auto;
            padding: 10px 20px;
        }
        .btn-accept {
            background: #27ae60;
            width: auto;
            padding: 8px 16px;
        }
        .btn-reject {
            background: #e74c3c;
            width: auto;
            padding: 8px 16px;
        }
        
        .two-columns { display: flex; gap: 30px; flex-wrap: wrap; }
        .column { flex: 1; min-width: 250px; }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .success {
            background: #efe;
            color: #0a0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .user-info {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-patient { background: #3498db; color: white; }
        .badge-medecin { background: #2ecc71; color: white; }
        
        .dashboard { display: none; }
        
        .doctor-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .doctor-card:hover { background: #e9ecef; transform: translateX(5px); }
        .doctor-card.selected { background: #d4edda; border-color: #27ae60; }
        .doctor-info { display: flex; align-items: center; gap: 15px; }
        .doctor-avatar { font-size: 40px; }
        .doctor-details h4 { margin-bottom: 5px; color: #2c3e50; }
        .doctor-details p { color: #7f8c8d; font-size: 14px; }
        .doctor-status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #2ecc71;
            color: white;
        }
        
        .selected-doctor-info {
            margin-top: 20px;
            padding: 15px;
            background: #e8f4fd;
            border-radius: 10px;
            text-align: center;
        }
        
        .video-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .video-box {
            flex: 1;
            min-width: 280px;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
        }
        .video-box h4 {
            color: white;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            margin: 0;
        }
        video {
            width: 100%;
            background: #0f0f1a;
            min-height: 300px;
            transform: scaleX(-1);
        }
        .call-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .incoming-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            max-width: 300px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .sensor-card {
            background: #f0f4f8;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        .sensor-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            text-align: center;
        }
        .sensor-unit {
            font-size: 0.8em;
            color: #888;
        }
        .fhir-output {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .hidden { display: none; }
        
        @media (max-width: 768px) {
            body { padding: 10px; }
            .card { padding: 20px; }
            .video-box video { min-height: 200px; }
            .two-columns { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <h1 style="color: white;">🏥 Ma Santé en Ligne</h1>
            <div id="userInfo" class="user-info hidden"></div>
        </div>
        
        <!-- Panneau d'authentification -->
        <div id="authPanel" class="card">
            <div id="authError" class="error"></div>
            <div id="authSuccess" class="success"></div>
            <div class="two-columns">
                <div class="column">
                    <h2>🔐 Connexion</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="loginEmail" required placeholder="exemple@email.com">
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="loginPassword" required placeholder="mot de passe">
                        </div>
                        <button type="submit">Se connecter</button>
                    </form>
                </div>
                <div class="column">
                    <h2>📝 Inscription</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label>Nom complet</label>
                            <input type="text" id="registerName" required placeholder="Jean Dupont">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="registerEmail" required placeholder="email@exemple.com">
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="registerPassword" required placeholder="au moins 4 caractères">
                        </div>
                        <div class="form-group">
                            <label>Je suis :</label>
                            <select id="registerRole">
                                <option value="patient">👤 Patient</option>
                                <option value="medecin">👨‍⚕️ Médecin</option>
                            </select>
                        </div>
                        <button type="submit">S'inscrire</button>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- Tableau de bord -->
        <div id="dashboard" class="dashboard">
            <div class="card">
                <div id="dashboardContent">
                    <p style="text-align: center;">Chargement...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        
        let currentUser = null;
        let doctors = [];
        let selectedDoctor = null;
        let socket = null;
        
        // WebRTC
        let localStream = null;
        let peerConnection = null;
        let currentCallId = null;
        let currentTargetSocketId = null;
        let activeCall = false;
        
        // Télésurveillance (capteur simulé)
        let sensorInterval = null;
        
        // Configuration ICE avec STUN (serveurs gratuits)
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ]
        };
        
        // ============================================
        // FONCTIONS UTILITAIRES
        // ============================================
        
        function showError(message, isAuth = true) {
            const errorDiv = document.getElementById('authError');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                setTimeout(() => errorDiv.style.display = 'none', 4000);
            } else {
                alert(message);
            }
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('authSuccess');
            if (successDiv) {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
                setTimeout(() => successDiv.style.display = 'none', 4000);
            }
        }
        
        // ============================================
        // AUTHENTIFICATION
        // ============================================
        
        async function register(userData) {
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.message);
                showSuccess(data.message);
                document.getElementById('registerForm').reset();
            } catch (error) {
                showError(error.message);
            }
        }
        
        async function login(credentials) {
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(credentials)
                });
                const data = await response.json();
                if (!data.success) throw new Error(data.message);
                currentUser = data.user;
                await loadDoctors();
                initSocket();
                updateUI();
            } catch (error) {
                showError(error.message);
            }
        }
        
        async function loadDoctors() {
            try {
                const response = await fetch('/api/doctors');
                doctors = await response.json();
            } catch (error) {
                console.error('Erreur chargement médecins:', error);
                doctors = [];
            }
        }
        
        function logout() {
            if (activeCall) endCall();
            if (sensorInterval) clearInterval(sensorInterval);
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            currentUser = null;
            selectedDoctor = null;
            updateUI();
        }
        
        // ============================================
        // SOCKET.IO & SIGNALISATION
        // ============================================
        
        function initSocket() {
            if (socket) socket.disconnect();
            
            socket = io();
            
            socket.on('connect', () => {
                console.log('🔌 Socket.IO connecté');
                socket.emit('register-user-name', {
                    userId: currentUser.id,
                    userName: currentUser.name,
                    role: currentUser.role
                });
            });
            
            // Appel entrant pour le médecin
            socket.on('incoming-call', (data) => {
                console.log('📞 Appel entrant:', data);
                if (currentUser.role === 'medecin') {
                    showIncomingCallNotification(data);
                }
            });
            
            // Confirmation que la demande d'appel a été envoyée
            socket.on('call-requested', (data) => {
                console.log('📞 Demande envoyée:', data);
                showSuccess('Demande de consultation envoyée. En attente de réponse du médecin...');
            });
            
            // Le médecin a accepté l'appel
            socket.on('call-accepted', async (data) => {
                console.log('✅ Appel accepté par le médecin');
                currentCallId = data.callId;
                currentTargetSocketId = data.doctorSocketId;
                showSuccess('Le médecin a accepté la consultation. Mise en relation...');
                await startCall(true);
            });
            
            // Appel refusé
            socket.on('call-rejected', (data) => {
                alert(`❌ ${data.message}`);
                endCall();
            });
            
            // Prêt pour WebRTC (côté médecin)
            socket.on('ready-for-webrtc', async (data) => {
                console.log('🎥 Prêt pour WebRTC avec patient');
                currentCallId = data.callId;
                currentTargetSocketId = data.patientSocketId;
                await startCall(false);
            });
            
            // Réception d'une offre WebRTC
            socket.on('webrtc-offer', async (data) => {
                console.log('📤 Réception offre WebRTC');
                await handleOffer(data);
            });
            
            // Réception d'une réponse WebRTC
            socket.on('webrtc-answer', async (data) => {
                console.log('📥 Réception answer WebRTC');
                await handleAnswer(data);
            });
            
            // Réception d'un candidat ICE
            socket.on('webrtc-ice-candidate', async (data) => {
                console.log('🧊 Réception ICE candidate');
                await handleIceCandidate(data);
            });
            
            // Fin d'appel
            socket.on('call-ended', () => {
                console.log('📞 Appel terminé par l\'autre partie');
                endCall();
            });
            
            // Réception de données du capteur
            socket.on('sensor-data', (data) => {
                displaySensorData(data);
            });
        }
        
        // ============================================
        // WEBRTC
        // ============================================
        
        async function startCall(isInitiator) {
            try {
                // Arrêter toute session existante
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                
                // Accéder à la caméra/micro
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                
                // Afficher la vidéo locale
                const localVideo = document.getElementById('localVideo');
                if (localVideo) localVideo.srcObject = localStream;
                
                // Créer la connexion peer
                peerConnection = new RTCPeerConnection(configuration);
                
                // Ajouter les tracks locaux
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                // Gérer les tracks distants
                peerConnection.ontrack = (event) => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                    }
                };
                
                // Gérer les candidats ICE
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate && currentTargetSocketId) {
                        socket.emit('webrtc-ice-candidate', {
                            targetSocketId: currentTargetSocketId,
                            candidate: event.candidate
                        });
                    }
                };
                
                // Gérer l'état de la connexion
                peerConnection.onconnectionstatechange = () => {
                    console.log('État connexion:', peerConnection.connectionState);
                    if (peerConnection.connectionState === 'disconnected' || 
                        peerConnection.connectionState === 'failed') {
                        endCall();
                    }
                };
                
                peerConnection.oniceconnectionstatechange = () => {
                    console.log('État ICE:', peerConnection.iceConnectionState);
                };
                
                if (isInitiator) {
                    // Créer et envoyer l'offre
                    const offer = await peerConnection.createOffer();
                    await peerConnection.setLocalDescription(offer);
                    socket.emit('webrtc-offer', {
                        targetSocketId: currentTargetSocketId,
                        offer: offer
                    });
                }
                
                showCallInterface(true);
                activeCall = true;
                
                // Démarrer le capteur de télésurveillance
                startSensorSimulation();
                
            } catch (error) {
                console.error('Erreur WebRTC:', error);
                alert('Impossible d\'accéder à la caméra/microphone. Vérifiez vos permissions.');
                endCall();
            }
        }
        
        async function handleOffer(data) {
            try {
                if (!peerConnection) {
                    // Créer la connexion si elle n'existe pas
                    localStream = await navigator.mediaDevices.getUserMedia({ 
                        video: true, 
                        audio: true 
                    });
                    const localVideo = document.getElementById('localVideo');
                    if (localVideo) localVideo.srcObject = localStream;
                    
                    peerConnection = new RTCPeerConnection(configuration);
                    localStream.getTracks().forEach(track => {
                        peerConnection.addTrack(track, localStream);
                    });
                    
                    peerConnection.ontrack = (event) => {
                        const remoteVideo = document.getElementById('remoteVideo');
                        if (remoteVideo && event.streams[0]) {
                            remoteVideo.srcObject = event.streams[0];
                        }
                    };
                    
                    peerConnection.onicecandidate = (event) => {
                        if (event.candidate && currentTargetSocketId) {
                            socket.emit('webrtc-ice-candidate', {
                                targetSocketId: currentTargetSocketId,
                                candidate: event.candidate
                            });
                        }
                    };
                }
                
                await peerConnection.setRemoteDescription(data.offer);
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                socket.emit('webrtc-answer', {
                    targetSocketId: data.fromSocketId,
                    answer: answer
                });
                
                showCallInterface(true);
                activeCall = true;
                
                // Démarrer le capteur
                startSensorSimulation();
                
            } catch (error) {
                console.error('Erreur handleOffer:', error);
            }
        }
        
        async function handleAnswer(data) {
            if (peerConnection && peerConnection.currentRemoteDescription === null) {
                await peerConnection.setRemoteDescription(data.answer);
            }
        }
        
        async function handleIceCandidate(data) {
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(data.candidate);
                } catch (error) {
                    console.error('Erreur ajout ICE candidate:', error);
                }
            }
        }
        
        async function endCall() {
            activeCall = false;
            
            // Arrêter le capteur
            if (sensorInterval) {
                clearInterval(sensorInterval);
                sensorInterval = null;
            }
            
            // Fermer les streams
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Fermer la connexion peer
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            // Notifier le serveur
            if (currentCallId && socket) {
                socket.emit('end-call', { callId: currentCallId });
                currentCallId = null;
            }
            
            currentTargetSocketId = null;
            showCallInterface(false);
            loadDashboardContent();
        }
        
        function showCallInterface(show) {
            const container = document.getElementById('dashboardContent');
            const existingInterface = document.getElementById('callInterface');
            
            if (existingInterface) existingInterface.remove();
            
            if (show && container) {
                const callDiv = document.createElement('div');
                callDiv.id = 'callInterface';
                callDiv.innerHTML = `
                    <div class="video-container">
                        <div class="video-box">
                            <h4>👤 Vous</h4>
                            <video id="localVideo" autoplay muted playsinline></video>
                        </div>
                        <div class="video-box">
                            <h4>🩺 ${currentUser.role === 'patient' ? 'Médecin' : 'Patient'}</h4>
                            <video id="remoteVideo" autoplay playsinline></video>
                        </div>
                    </div>
                    <div class="call-controls">
                        <button class="btn-end-call" onclick="window.endCall()">📞 Raccrocher</button>
                    </div>
                    <div class="sensor-card">
                        <h4>📊 Télésurveillance - Signes Vitaux</h4>
                        <div id="sensorDisplay">
                            <div class="sensor-value" id="heartRate">--</div>
                            <div class="sensor-unit">Battements par minute (BPM)</div>
                        </div>
                        <div id="fhirOutput" class="fhir-output"></div>
                    </div>
                `;
                const consultationArea = document.getElementById('consultationArea') || container;
                consultationArea.innerHTML = '';
                consultationArea.appendChild(callDiv);
            }
        }
        
        // ============================================
        // TÉLÉSURVEILLANCE - CAPTEUR SIMULÉ
        // ============================================
        
        function startSensorSimulation() {
            if (sensorInterval) clearInterval(sensorInterval);
            
            // Simuler une fréquence cardiaque entre 60 et 100 BPM
            sensorInterval = setInterval(() => {
                const heartRate = Math.floor(Math.random() * (100 - 60 + 1) + 60);
                const timestamp = new Date().toISOString();
                
                // Mettre à jour l'affichage local
                updateSensorDisplay(heartRate);
                
                // Créer la ressource FHIR Observation
                const fhirObservation = createFhirObservation(heartRate, timestamp);
                
                // Afficher le JSON FHIR
                displayFhirJson(fhirObservation);
                
                // Envoyer les données à l'autre participant
                if (currentTargetSocketId && socket) {
                    socket.emit('sensor-data', {
                        targetSocketId: currentTargetSocketId,
                        sensorType: 'heart-rate',
                        value: heartRate,
                        unit: 'beats/min',
                        timestamp: timestamp,
                        fhirResource: fhirObservation
                    });
                }
            }, 5000); // Toutes les 5 secondes
        }
        
        function updateSensorDisplay(value) {
            const heartRateDiv = document.getElementById('heartRate');
            if (heartRateDiv) {
                heartRateDiv.innerHTML = `${value} <span style="font-size: 0.5em;">BPM</span>`;
            }
        }
        
        function displaySensorData(data) {
            const heartRateDiv = document.getElementById('heartRate');
            if (heartRateDiv && data.value) {
                heartRateDiv.innerHTML = `${data.value} <span style="font-size: 0.5em;">BPM</span>`;
            }
            if (data.fhirResource) {
                displayFhirJson(data.fhirResource);
            }
        }
        
        // ============================================
        // HL7 FHIR - RESSOURCE OBSERVATION
        // ============================================
        
        function createFhirObservation(heartRate, timestamp) {
            return {
                resourceType: "Observation",
                id: `obs-${Date.now()}-${Math.random().toString(36).substr(2, 6)}`,
                meta: {
                    profile: ["http://hl7.org/fhir/StructureDefinition/vitalsigns"]
                },
                status: "final",
                category: [
                    {
                        coding: [
                            {
                                system: "http://terminology.hl7.org/CodeSystem/observation-category",
                                code: "vital-signs",
                                display: "Vital Signs"
                            }
                        ]
                    }
                ],
                code: {
                    coding: [
                        {
                            system: "http://loinc.org",
                            code: "8867-4",
                            display: "Heart rate"
                        }
                    ],
                    text: "Fréquence cardiaque"
                },
                subject: {
                    reference: `Patient/${currentUser?.id || 'unknown'}`,
                    display: currentUser?.name || "Patient"
                },
                effectiveDateTime: timestamp,
                issued: new Date().toISOString(),
                valueQuantity: {
                    value: heartRate,
                    unit: "beats/minute",
                    system: "http://unitsofmeasure.org",
                    code: "/min"
                },
                performer: [
                    {
                        reference: `Practitioner/${currentTargetSocketId || 'system'}`,
                        display: "Système de télésurveillance"
                    }
                ],
                device: {
                    display: "Simulateur de capteur médical"
                },
                note: [
                    {
                        text: "Mesure simulée à des fins de démonstration"
                    }
                ]
            };
        }
        
        function displayFhirJson(fhirResource) {
            const fhirOutput = document.getElementById('fhirOutput');
            if (fhirOutput) {
                fhirOutput.innerHTML = `
                    <strong>📋 FHIR Observation (JSON)</strong><br>
                    <pre style="margin-top: 10px; white-space: pre-wrap; word-wrap: break-word;">${JSON.stringify(fhirResource, null, 2)}</pre>
                `;
            }
        }
        
        // ============================================
        // GESTION DES APPELS ENTRANTS (MÉDECIN)
        // ============================================
        
        let pendingCall = null;
        
        function showIncomingCallNotification(data) {
            // Supprimer les anciennes notifications
            const oldNotif = document.querySelector('.incoming-notification');
            if (oldNotif) oldNotif.remove();
            
            pendingCall = data;
            
            const notification = document.createElement('div');
            notification.className = 'incoming-notification';
            notification.innerHTML = `
                <h4>📞 Appel entrant</h4>
                <p><strong>Patient:</strong> ${data.patientName}</p>
                <p><strong>ID Appel:</strong> ${data.callId.substring(0, 8)}...</p>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn-accept" onclick="window.acceptCall()">✅ Accepter</button>
                    <button class="btn-reject" onclick="window.rejectCall()">❌ Refuser</button>
                </div>
            `;
            document.body.appendChild(notification);
        }
        
        window.acceptCall = function() {
            if (pendingCall) {
                const notification = document.querySelector('.incoming-notification');
                if (notification) notification.remove();
                
                currentCallId = pendingCall.callId;
                currentTargetSocketId = pendingCall.fromSocketId;
                
                socket.emit('accept-call', {
                    callId: pendingCall.callId,
                    doctorId: currentUser.id,
                    doctorName: currentUser.name,
                    patientSocketId: pendingCall.fromSocketId
                });
                
                pendingCall = null;
            }
        };
        
        window.rejectCall = function() {
            if (pendingCall) {
                socket.emit('reject-call', {
                    callId: pendingCall.callId,
                    patientSocketId: pendingCall.fromSocketId
                });
                const notification = document.querySelector('.incoming-notification');
                if (notification) notification.remove();
                pendingCall = null;
            }
        };
        
        // Exposer les fonctions globalement pour les appels HTML
        window.endCall = endCall;
        window.selectDoctor = function(doctor) {
            selectedDoctor = doctor;
            loadDashboardContent();
        };
        
        window.requestCall = function() {
            if (!selectedDoctor) {
                alert('Veuillez d\'abord sélectionner un médecin');
                return;
            }
            if (!socket) {
                alert('Problème de connexion. Veuillez rafraîchir la page.');
                return;
            }
            socket.emit('call-doctor', {
                patientId: currentUser.id,
                patientName: currentUser.name,
                doctorId: selectedDoctor.id,
                doctorName: selectedDoctor.name
            });
        };
        
        // ============================================
        // INTERFACE UTILISATEUR
        // ============================================
        
        function loadDashboardContent() {
            const container = document.getElementById('dashboardContent');
            if (!container) return;
            
            if (currentUser.role === 'patient') {
                let doctorsHtml = '';
                doctors.forEach(doctor => {
                    doctorsHtml += `
                        <div class="doctor-card ${selectedDoctor?.id === doctor.id ? 'selected' : ''}" onclick="selectDoctor(${JSON.stringify(doctor).replace(/"/g, '&quot;')})">
                            <div class="doctor-info">
                                <div class="doctor-avatar">${doctor.avatar}</div>
                                <div class="doctor-details">
                                    <h4>${doctor.name}</h4>
                                    <p>${doctor.specialty}</p>
                                </div>
                            </div>
                            <div class="doctor-status">Disponible</div>
                        </div>
                    `;
                });
                
                let selectedHtml = '';
                if (selectedDoctor) {
                    selectedHtml = `
                        <div class="selected-doctor-info">
                            <strong>👨‍⚕️ Médecin sélectionné :</strong> ${selectedDoctor.name} (${selectedDoctor.specialty})
                            <button class="btn-consult" onclick="requestCall()">🩺 Lancer la consultation</button>
                        </div>
                    `;
                }
                
                container.innerHTML = `
                    <h2>👋 Bonjour ${currentUser.name}</h2>
                    <h3>📋 Annuaire des médecins</h3>
                    <div id="doctorList">${doctorsHtml || '<p>Aucun médecin disponible.</p>'}</div>
                    ${selectedHtml}
                    <div id="consultationArea" style="margin-top: 20px;"></div>
                `;
            } else {
                container.innerHTML = `
                    <h2>👨‍⚕️ Bonjour Dr. ${currentUser.name}</h2>
                    <h3>📞 État de la consultation</h3>
                    <div id="requestsList" style="padding: 20px; text-align: center; background: #f8f9fa; border-radius: 10px;">
                        <p>🟢 Vous êtes connecté et disponible</p>
                        <p style="font-size: 14px; color: #888; margin-top: 10px;">Les consultations arriveront ici automatiquement</p>
                    </div>
                    <div id="consultationArea" style="margin-top: 30px;"></div>
                `;
            }
        }
        
        function updateUI() {
            const authPanel = document.getElementById('authPanel');
            const dashboard = document.getElementById('dashboard');
            const userInfo = document.getElementById('userInfo');
            
            if (currentUser) {
                authPanel.style.display = 'none';
                dashboard.style.display = 'block';
                userInfo.classList.remove('hidden');
                userInfo.innerHTML = `
                    <span>👋 ${currentUser.name}</span>
                    <span class="badge ${currentUser.role === 'patient' ? 'badge-patient' : 'badge-medecin'}">
                        ${currentUser.role === 'patient' ? 'Patient' : 'Médecin'}
                    </span>
                    <button class="btn-logout" onclick="logout()">Déconnexion</button>
                `;
                loadDashboardContent();
            } else {
                authPanel.style.display = 'block';
                dashboard.style.display = 'none';
                userInfo.classList.add('hidden');
                if (socket) {
                    socket.disconnect();
                    socket = null;
                }
            }
        }
        
        // ============================================
        // ÉCOUTEURS D'ÉVÉNEMENTS
        // ============================================
        
        document.getElementById('registerForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            register({
                name: document.getElementById('registerName').value,
                email: document.getElementById('registerEmail').value,
                password: document.getElementById('registerPassword').value,
                role: document.getElementById('registerRole').value
            });
        });
        
        document.getElementById('loginForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            login({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            });
        });
        
        // Initialisation
        updateUI();
    </script>
</body>
</html>
